name: Sync Benchmark Data

on:
  schedule:
    # Once daily at 06:00 UTC
    - cron: "0 6 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch-and-commit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Fetch benchmark data
        run: node scripts/fetch-data.js

      - name: Commit updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/data/scores/
          if ! git diff --quiet --cached public/data/scores/; then
            git commit -m "chore: sync benchmark data [skip ci]"
            git push
          else
            echo "No data changes detected — skipping commit."
          fi
