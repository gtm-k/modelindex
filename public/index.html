  // ── Event binding per step ───────────────────────────────────────────────────

  function _bindStepEvents(step) {
    const backBtn = document.getElementById('wizard-back-btn');
    const nextBtn = document.getElementById('wizard-next-btn');
    const resetBtn = document.getElementById('wizard-reset-btn');

    if (backBtn) backBtn.addEventListener('click', () => WizardController.back());
    if (nextBtn) nextBtn.addEventListener('click', () => {
      _collectStepData(step);
      WizardController.next();
    });
    if (resetBtn) resetBtn.addEventListener('click', () => WizardController.reset());

    // Step sidebar click navigation
    document.querySelectorAll('.wizard-step-item[data-goto]').forEach(el => {
      el.addEventListener('click', () => {
        const n = parseInt(el.dataset.goto, 10);
        _collectStepData(WizardController.currentStep);
        WizardController.goTo(n);
      });
    });

    if (step === 1) {
      // License pills
      document.querySelectorAll('[data-constraint-lic]').forEach(pill => {
        pill.addEventListener('click', () => {
          pill.classList.toggle('active');
          const c = WizardController.indexConfig.hard_constraints ||= {};
          c.licenses = [...document.querySelectorAll('[data-constraint-lic].active')]
            .map(p => p.dataset.constraintLic);
        });
      });
      document.getElementById('c-self-host')?.addEventListener('change', e => {
        (WizardController.indexConfig.hard_constraints ||= {}).self_hostable = e.target.checked;
      });
      document.getElementById('c-context')?.addEventListener('change', e => {
        (WizardController.indexConfig.hard_constraints ||= {}).min_context = parseInt(e.target.value, 10);
      });
    }

    if (step === 3) {
      // Factor sliders → debounced MCS preview
      document.querySelectorAll('.factor-slider').forEach(slider => {
        slider.addEventListener('input', () => {
          const id = slider.dataset.factor;
          const val = parseInt(slider.value, 10);
          WizardController.indexConfig.factor_weights[id] = val;
          document.getElementById(`fw-val-${id}`).textContent = val;
          const total = _getWeightTotal();
          const totalEl = document.getElementById('weight-total');
          totalEl.textContent = `${total.toFixed(0)}/100`;
          totalEl.className = `weight-total ${Math.abs(total-100)<=0.5?'ok':'bad'}`;
          // Debounced preview
          clearTimeout(_mcsDebounce);
          _mcsDebounce = setTimeout(_updateMCSPreview, 300);
        });
      });

      document.getElementById('normalize-btn')?.addEventListener('click', () => {
        const total = _getWeightTotal();
        if (total === 0) return;
        const scale = 100 / total;
        const schema = App.state.factorSchema || [];
        // Round each weight, then fix rounding error on the largest weight
        const rounded = schema.map(f => ({
          id: f.factor_id,
          val: Math.round((WizardController.indexConfig.factor_weights[f.factor_id] || 0) * scale)
        }));
        const roundedTotal = rounded.reduce((a, r) => a + r.val, 0);
        if (roundedTotal !== 100 && rounded.length > 0) {
          // Adjust the largest weight to compensate for rounding error
          const largest = rounded.reduce((max, r) => r.val > max.val ? r : max, rounded[0]);
          largest.val += (100 - roundedTotal);
        }
        rounded.forEach(r => {
          WizardController.indexConfig.factor_weights[r.id] = r.val;
          const slider = document.querySelector(`.factor-slider[data-factor="${r.id}"]`);
          const valEl  = document.getElementById(`fw-val-${r.id}`);
          if (slider) slider.value = r.val;
          if (valEl)  valEl.textContent = r.val;
        });
        const totalEl = document.getElementById('weight-total');
        totalEl.textContent = '100/100';
        totalEl.className = 'weight-total ok';
        _updateMCSPreview();
      });
    }

    if (step === 4) {
      // Model card selection
      document.querySelectorAll('.model-card:not(.excluded)').forEach(card => {
        card.addEventListener('click', () => {
          card.classList.toggle('selected');
          const selected = new Set(WizardController.indexConfig.selected_models || []);
          const id = card.dataset.model;
          card.classList.contains('selected') ? selected.add(id) : selected.delete(id);
          WizardController.indexConfig.selected_models = [...selected];
          document.getElementById('selected-count').textContent = selected.size;
        });
      });

      document.getElementById('select-all-btn')?.addEventListener('click', () => {
        const passing = _modelsPassingConstraints().map(m => m.model_id);
        WizardController.indexConfig.selected_models = passing;
        document.querySelectorAll('.model-card:not(.excluded)').forEach(c => c.classList.add('selected'));
        document.getElementById('selected-count').textContent = passing.length;
      });

      document.getElementById('deselect-all-btn')?.addEventListener('click', () => {
        WizardController.indexConfig.selected_models = [];
        document.querySelectorAll('.model-card:not(.excluded)').forEach(c => c.classList.remove('selected'));
        document.getElementById('selected-count').textContent = 0;
      });
    }

    if (step === 5) {
      const runBtn   = document.getElementById('run-sensitivity-btn');
      const rerunBtn = document.getElementById('rerun-sensitivity-btn');
      const handler  = async () => {
        if (runBtn) runBtn.disabled = true;
        if (rerunBtn) rerunBtn.disabled = true;
        try {
          const selectedIds = WizardController.indexConfig.selected_models || [];
          const weights = WizardController.indexConfig.factor_weights;
          // Transform DB score rows into the format Sensitivity.runSensitivity expects
          // computeBatchMCS expects scores as { sub_metric_id: rawScore }
          const allModelScores = selectedIds.map(id => ({
            modelId: id,
            scores: Object.fromEntries((_allScores[id] || []).map(s => [s.sub_metric, s.raw_score])),
          }));
          const result = Sensitivity.runSensitivity(
            allModelScores,
            weights,
            null,
            App.state.baselineRaw
          );
          WizardController.indexConfig.sensitivityResult = result;
          _renderStep();
          setTimeout(() => _drawSensitivityChart(result), 50);
        } catch (e) {
          showToast('Sensitivity analysis failed: ' + e.message, 'error');
        }
      };
      if (runBtn)   runBtn.addEventListener('click', handler);
      if (rerunBtn) rerunBtn.addEventListener('click', handler);
    }

    if (step === 6) {
      document.getElementById('save-index-btn')?.addEventListener('click', _saveIndex);
      document.getElementById('export-report-btn')?.addEventListener('click', _exportReport);
    }
  }

  // ── Collect step data ────────────────────────────────────────────────────────

  function _collectStepData(step) {
    if (step === 2) {
      const nameEl = document.getElementById('index-name');
      if (nameEl) WizardController.indexConfig.name = nameEl.value.trim();
      const preset = document.querySelector('input[name="preset"]:checked');
      if (preset) {
        const presetId = preset.value === 'custom' ? null : preset.value;
        WizardController.indexConfig.use_case_preset = presetId || 'custom';
        if (presetId) {
          const p = (App.state.presets || []).find(p => p.id === presetId);
          if (p) WizardController.indexConfig.factor_weights = { ...p.factor_weights };
        } else {
          if (!WizardController.indexConfig.factor_weights) _equalizeWeights();
        }
      } else {
        // No preset selected — ensure weights are initialized
        if (!WizardController.indexConfig.factor_weights) _equalizeWeights();
      }
    }
  }

  // ── Live MCS preview ─────────────────────────────────────────────────────────

  function _updateMCSPreview() {
    const tbody = document.getElementById('mcs-preview-tbody');
    if (!tbody) return;
    const weights = WizardController.indexConfig.factor_weights || {};
    const domainModels = _allModels.filter(m => (m.domain || 'llm') === App.state.activeDomain);
    const ranked = domainModels
      .map(m => ({ ...m, mcs: _computeMCSInline(_allScores[m.model_id] || [], weights) }))
      .sort((a, b) => b.mcs - a.mcs)
      .slice(0, 10);

    tbody.innerHTML = ranked.map((m, i) => `
      <tr>
        <td style="color:var(--color-text-3);font-family:var(--font-mono)">${i+1}</td>
        <td>${m.name}</td>
        <td style="min-width:100px">${scoreBar(m.mcs, 'var(--color-accent)')}</td>
      </tr>`).join('');
  }

  // ── Sensitivity chart ────────────────────────────────────────────────────────

  function _drawSensitivityChart(result) {
    const canvas = document.getElementById('sensitivity-chart');
    if (!canvas || !result?.perFactor) return;
    if (_sensitivityChart) { _sensitivityChart.destroy(); _sensitivityChart = null; }

    const schema = App.state.factorSchema || [];
    const labels  = [];
    const plusData = [];
    const minusData = [];

    for (const factor of schema) {
      const fid = factor.factor_id;
      const pf  = result.perFactor[fid];
      if (!pf) continue;
      labels.push(factor.label);
      const modelDeltaValues = pf.modelDeltas ? Object.values(pf.modelDeltas) : Object.values(pf);
      const avgRankChange = modelDeltaValues.reduce((sum, v) => sum + Math.abs(v.rankDelta || v.maxAbsDelta || 0), 0)
        / Math.max(modelDeltaValues.length, 1);
      plusData.push(avgRankChange);
      minusData.push(-avgRankChange);
    }

    _sensitivityChart = new Chart(canvas, {
      type: 'bar',
      data: {
        labels,
        datasets: [
          { label: '+10', data: plusData,  backgroundColor: 'rgba(59,91,219,.65)', borderRadius: 3 },
          { label: '\u221210', data: minusData, backgroundColor: 'rgba(201,42,42,.55)',  borderRadius: 3 },
        ],
      },
      options: {
        indexAxis: 'y',
        responsive: true,
        plugins: { legend: { display: true, labels: { font: { size: 11 } } } },
        scales: {
          x: {
            title: { display: true, text: 'Avg rank change', font: { size: 11 } },
            grid: { color: 'rgba(128,128,128,.1)' },
          },
          y: { grid: { display: false } },
        },
      },
    });
  }

  // ── Save & Export ────────────────────────────────────────────────────────────

  async function _saveIndex() {
    const cfg = WizardController.indexConfig;
    const btn = document.getElementById('save-index-btn');
    if (btn) btn.disabled = true;
    try {
      const { id } = await DB.saveIndex({
        name:              cfg.name,
        use_case_preset:   cfg.use_case_preset || 'custom',
        factor_weights:    cfg.factor_weights,
        hard_constraints:  cfg.hard_constraints || {},
        selected_models:   cfg.selected_models || [],
        index_mode:        'weighted',
      });
      await DB.saveIndexVersion(id, cfg);
      showToast(`Index "${cfg.name}" saved`, 'success');
      WizardController.reset();
    } catch (e) {
      showToast('Failed to save index: ' + e.message, 'error');
      if (btn) btn.disabled = false;
    }
  }

  async function _exportReport() {
    const cfg = WizardController.indexConfig;
    const weights = cfg.factor_weights || {};
    const selected = (cfg.selected_models || []);
    const ranked = _allModels
      .filter(m => selected.includes(m.model_id))
      .map(m => ({ ...m, mcs: _computeMCSInline(_allScores[m.model_id] || [], weights) }))
      .sort((a, b) => b.mcs - a.mcs);

    const schema = App.state.factorSchema || [];
    const topWeights = schema
      .map(f => `${f.label}: ${Math.round(weights[f.factor_id] || 0)}`)
      .filter(s => !s.endsWith(': 0'))
      .join(' | ');

    const table = ranked.map((m, i) =>
      `| ${i+1} | ${m.name} | ${m.provider||'\u2014'} | ${m.mcs.toFixed(1)} | ${m.license||'\u2014'} |`
    ).join('\n');

    const md = `# ModelIndex Report: ${cfg.name || 'Unnamed Index'}

**Generated:** ${new Date().toISOString().slice(0,10)}
**Use-case:** ${cfg.use_case_preset || 'Custom'}
**Weights:** ${topWeights}

## Rankings

| Rank | Model | Provider | MCS | License |
|------|-------|----------|-----|---------|
${table}

---
*Generated by ModelIndex. Scores from T1 public benchmarks. Not a substitute for independent evaluation.*
`;

    _downloadFile(
      `${(cfg.name||'index').replace(/\s+/g,'-').toLowerCase()}-report.md`,
      md,
      'text/markdown'
    );
  }

  // ── Public API ───────────────────────────────────────────────────────────────

  App.views['index-builder'] = {
    async mount() {
      // Pre-load model data so steps are responsive
      try {
        const models = await DB.getModels();
        _allModels = models;
        const scoreResults = await Promise.all(
          models.map(m => DB.getScores(m.model_id))
        );
        _allScores = {};
        models.forEach((m, i) => { _allScores[m.model_id] = scoreResults[i] || []; });
      } catch (_) { /* non-fatal */ }
    },

    onEnter() {
      _renderStep();
    },
  };
})();

// FEATURE: Comparison Report
// ════════════════════════════════════════════════════════════════════════════════
const ComparisonReport = (function() {

  function generate(models, weights, allScores, baseline, factorSchema) {
    const schema = factorSchema || App.state.factorSchema || [];
    const bl     = baseline    || App.state.baseline    || {};

    function mcsInline(modelScores) {
      const subScores = {};
      for (const s of modelScores) {
        const b = bl[s.sub_metric];
        if (!b) continue;
        let n = b.max === b.min ? 50 : ((s.raw_score - b.min) / (b.max - b.min)) * 100;
        n = Math.max(0, Math.min(100, n));
        if (b.invert) n = 100 - n;
        subScores[s.sub_metric] = n;
      }
      let mcs = 0, totalW = 0;
      for (const f of schema) {
        const w = (weights || {})[f.factor_id] || 0;
        if (!w) continue;
        const vals = f.sub_metrics.map(sm => subScores[sm.sub_metric_id]).filter(v => v != null);
        if (!vals.length) continue;
        mcs += (vals.reduce((a, b) => a + b, 0) / vals.length) * w;
        totalW += w;
      }
      return totalW > 0 ? mcs / totalW : 0;
    }

    const ranked = models.map(m => ({
      ...m,
      mcs: mcsInline(allScores[m.model_id] || []),
      scores: allScores[m.model_id] || [],
    })).sort((a, b) => b.mcs - a.mcs);

    const topWeights = schema
      .filter(f => (weights||{})[f.factor_id] > 0)
      .sort((a, b) => (weights[b.factor_id]||0) - (weights[a.factor_id]||0))
      .slice(0, 5)
      .map(f => `${f.label} (${Math.round(weights[f.factor_id]||0)})`)
      .join(', ');

    // Ranked table
    const tableRows = ranked.map((m, i) => {
      const factorCols = schema.map(f => {
        const subs = m.scores.filter(s => s.factor_group === f.factor_id);
        if (!subs.length) return '\u2014';
        const vals = subs.map(s => {
          const b = bl[s.sub_metric];
          if (!b) return null;
          let n = b.max === b.min ? 50 : ((s.raw_score - b.min) / (b.max - b.min)) * 100;
          n = Math.max(0, Math.min(100, n));
          if (b.invert) n = 100 - n;
          return n;
        }).filter(v => v != null);
        return vals.length ? (vals.reduce((a,b)=>a+b,0)/vals.length).toFixed(1) : '\u2014';
      });
      return `| ${i+1} | ${m.name} | ${m.provider||'\u2014'} | ${m.mcs.toFixed(1)} | ${factorCols.join(' | ')} |`;
    }).join('\n');

    const factorHeaders = schema.map(f => f.tag).join(' | ');
    const factorSep     = schema.map(() => '---').join(' | ');

    // Provenance footnotes
    const sources = new Set();
    for (const m of ranked) {
      for (const s of m.scores) {
        if (s.benchmark_name && s.benchmark_url) {
          sources.add(`[${s.benchmark_name}](${s.benchmark_url})`);
        }
      }
    }

    // Contamination warnings
    const contaminated = [];
    for (const m of ranked) {
      for (const s of m.scores) {
        if (s.contamination_flag) contaminated.push(`${m.name} / ${s.sub_metric}`);
      }
    }

    // Staleness warnings
    const stale = [];
    for (const m of ranked) {
      for (const s of m.scores) {
        if (s.fetched_at) {
          const ageH = (Date.now() - new Date(s.fetched_at).getTime()) / 3600000;
          if (ageH > 168) stale.push(`${m.name} / ${s.sub_metric} (${Math.round(ageH/24)}d old)`);
        }
      }
    }

    const md = `# ModelIndex Comparison Report

**Generated:** ${new Date().toISOString().slice(0,16).replace('T',' ')} UTC
**Top factors:** ${topWeights || 'Equal weights'}
**Models compared:** ${ranked.length}

## Ranked Results

| # | Model | Provider | MCS | ${factorHeaders} |
|---|-------|----------|-----|${factorSep}|
${tableRows}

## Data Sources

${[...sources].map(s => `- ${s}`).join('\n') || '- No benchmark sources recorded'}

${contaminated.length ? `## Contamination Risk\n\nThe following sub-metrics have elevated contamination risk:\n\n${contaminated.map(c=>`- ${c}`).join('\n')}` : ''}

${stale.length ? `## Stale Data Warnings\n\nThe following scores are more than 7 days old:\n\n${stale.map(s=>`- ${s}`).join('\n')}` : ''}

---
*Generated by ModelIndex. Scores sourced from public benchmarks (T1 tier).
Results reflect model capability at time of data collection, not current versions.
This report is not a substitute for task-specific evaluation.*
`;
    return md;
  }

  return { generate };
})();

          <tbody>
            ${(connectorStatuses || []).map(c => {
              const last = c.lastSync;
              const lastSyncStr = last?.finished_at
                ? new Date(last.finished_at).toLocaleString()
                : '\u2014';
              const statusCls = c.isRunning ? 'chip-syncing'
                : last?.status === 'success' ? 'chip-ok'
                : last?.status === 'error'   ? 'chip-error'
                : c.tier === 'T2'            ? 'chip-disabled'
                : c.tier === 'T3'            ? 'chip-manual'
                : 'chip-disabled';
              const statusLabel = c.isRunning ? 'Syncing\u2026'
                : last?.status === 'success' ? 'OK'
                : last?.status === 'error'   ? 'Error'
                : c.tier === 'T2'            ? 'Disabled'
                : c.tier === 'T3'            ? 'Manual'
                : 'Never';
              const importBtn = c.tier === 'T3'
                ? `<button class="btn-secondary" data-import="${c.connectorId}"
                    style="font-size:11px;padding:2px 8px">Import File</button>`
                : `<button class="btn-secondary" data-sync="${c.connectorId}"
                    style="font-size:11px;padding:2px 8px" ${c.tier!=='T1'?'disabled':''}>Sync</button>`;
              return `
                <tr>
                  <td style="font-weight:500">${c.displayName}</td>
                  <td><span class="badge badge-accent">${c.tier}</span></td>
                  <td style="color:var(--color-text-3);font-family:var(--font-mono);font-size:11px">
                    ${c.schedule === 'manual' ? '\u2014' : c.schedule}
                  </td>
                  <td style="color:var(--color-text-3)">${lastSyncStr}</td>
                  <td style="font-family:var(--font-mono)">
                    ${last?.rows_upserted != null ? last.rows_upserted : '\u2014'}
                  </td>
                  <td><span class="chip ${statusCls}">${statusLabel}</span></td>
                  <td>${importBtn}</td>
                </tr>`;
            }).join('')}
          </tbody>
        </table>
        <div style="margin-top:var(--space-3)">
          <button class="btn-primary" id="sync-all-settings-btn">
            <i data-lucide="refresh-cw" style="width:13px;height:13px;vertical-align:-2px"></i>
            Sync All T1
          </button>
        </div>
      </div>

      <!-- Sync Log -->
      <div class="settings-section">
        <div class="settings-section-title">
          <i data-lucide="scroll-text" style="width:15px;height:15px"></i>
          Sync Log <span style="font-size:12px;font-weight:400;color:var(--color-text-3)">(last 50 events)</span>
        </div>
        <div style="max-height:240px;overflow-y:auto">
          ${(syncLog || []).length === 0
            ? `<p style="color:var(--color-text-3);font-size:13px">No sync events recorded yet.</p>`
            : (syncLog || []).map(e => `
              <div class="sync-log-row">
                <span style="color:var(--color-text-3);font-family:var(--font-mono);flex-shrink:0">
                  ${e.finished_at ? new Date(e.finished_at).toLocaleString() : '?'}
                </span>
                <span style="font-weight:500">${e.connector_id}</span>
                <span class="chip ${e.status==='success'?'chip-ok':'chip-error'}">${e.status}</span>
                ${e.rows_upserted != null ? `<span style="color:var(--color-text-3)">${e.rows_upserted} rows</span>` : ''}
                ${e.error_msg ? `<span style="color:var(--color-danger);flex:1;overflow:hidden;text-overflow:ellipsis">${e.error_msg}</span>` : ''}
              </div>`).join('')}
        </div>
      </div>

      <!-- Database -->
      <div class="settings-section">
        <div class="settings-section-title">
          <i data-lucide="hard-drive" style="width:15px;height:15px"></i>
          Database
        </div>
        <div class="settings-row">
          <span class="settings-row-label">Backup database</span>
          <button class="btn-secondary" id="backup-btn">
            <i data-lucide="download" style="width:13px;height:13px;vertical-align:-2px"></i>
            Backup\u2026
          </button>
        </div>
        <div class="settings-row">
          <span class="settings-row-label">Restore from backup</span>
          <button class="btn-secondary" id="restore-btn">
            <i data-lucide="upload" style="width:13px;height:13px;vertical-align:-2px"></i>
            Restore\u2026
          </button>
        </div>
      </div>

      <!-- Index Import -->
      <div class="settings-section">
        <div class="settings-section-title">
          <i data-lucide="file-input" style="width:15px;height:15px"></i>
          Import Index
        </div>
        <p style="font-size:13px;color:var(--color-text-2);margin-bottom:var(--space-2)">
          Import a <code>.modelindex-indexes</code> or <code>.json</code> file
          shared by another user.
        </p>
        <details style="font-size:12px;color:var(--color-text-3);margin-bottom:var(--space-3);cursor:pointer">
          <summary style="font-weight:500;color:var(--color-text-2)">View expected format</summary>
          <pre style="margin-top:var(--space-2);padding:var(--space-3);background:var(--color-bg-3);
            border-radius:var(--radius);overflow-x:auto;font-family:var(--font-mono);font-size:11px;
            line-height:1.5;border:1px solid var(--color-border)">{
  "name": "My Custom Index",
  "use_case_preset": "general",
  "factor_weights": {
    "reasoning": 20, "coding": 15,
    "factuality": 15, "safety": 10,
    "instruction": 10, "efficiency": 10,
    "context": 5, "multimodal": 5,
    "bias": 5, "agentic": 5
  },
  "hard_constraints": {
    "licenses": ["apache-2.0", "mit"],
    "self_hostable": true,
    "min_context": 32000
  },
  "selected_models": ["gpt-4o", "claude-3-7-sonnet"],
  "index_mode": "weighted"
}</pre>
          <p style="margin-top:var(--space-1)">
            <strong>Required:</strong> <code>name</code>, <code>factor_weights</code> (must sum to 100).
            All other fields are optional. Supports single object or array of indexes.
          </p>
        </details>
        <button class="btn-secondary" id="import-index-btn">
          <i data-lucide="upload" style="width:13px;height:13px;vertical-align:-2px"></i>
          Import Index File\u2026
        </button>
      </div>

      <!-- Manual Cost Management -->
      <div class="settings-section">
        <div class="settings-section-title">
          <i data-lucide="dollar-sign" style="width:15px;height:15px"></i>
          Manual Pricing Entries
        </div>
        <p style="font-size:12px;color:var(--color-text-3);margin:0 0 var(--space-3) 0;line-height:1.5">
          Add per-model token pricing (input/output cost per 1M tokens) to enable the cost efficiency column
          in the Registry. Click any "$\u2014" cost cell in the Registry table to add pricing for that model,
          or manage all entries here.
        </p>
        <div id="pricing-list">
          <p style="font-size:13px;color:var(--color-text-3)">Loading\u2026</p>
        </div>
      </div>

      <!-- App Info -->
      <div class="settings-section">
        <div class="settings-section-title">
          <i data-lucide="info" style="width:15px;height:15px"></i>
          About
        </div>
        <div class="settings-row">
          <span class="settings-row-label">Version</span>
          <span class="settings-row-value">${appVersion || '0.1.0-alpha'}</span>
        </div>
        <div class="settings-row">
          <span class="settings-row-label">License</span>
          <span class="settings-row-value">Apache 2.0</span>
        </div>
      </div>
    `;

    lucide.createIcons();
    _loadPricingList();
    _bindSettingsEvents();
  }

  async function _loadPricingList() {
    const container = document.getElementById('pricing-list');
    if (!container) return;
    try {
      const rows = await DB.getAllUserPricing();
      if (!rows || rows.length === 0) {
        container.innerHTML = `<p style="font-size:13px;color:var(--color-text-3)">
          No manual pricing entries. Click a cost cell in the Registry to add one.</p>`;
        return;
      }
      container.innerHTML = `
        <table class="connector-table">
          <thead><tr><th>Model</th><th>Input $/1M</th><th>Output $/1M</th><th>Source</th><th></th></tr></thead>
          <tbody>
            ${rows.map(r => `
              <tr>
                <td style="font-weight:500">${r.model_id}</td>
                <td style="font-family:var(--font-mono)">$${r.input_cost_per_1m}</td>
                <td style="font-family:var(--font-mono)">$${r.output_cost_per_1m}</td>
                <td style="color:var(--color-text-3)">${r.source_url
                  ? `<a href="${r.source_url}" target="_blank" rel="noopener">Link</a>`
                  : '\u2014'}</td>
                <td>
                  <button class="btn-ghost" data-delete-pricing="${r.model_id}"
                    style="font-size:12px;color:var(--color-danger)">Delete</button>
                </td>
              </tr>`).join('')}
          </tbody>
        </table>`;

      container.querySelectorAll('[data-delete-pricing]').forEach(btn => {
        btn.addEventListener('click', async () => {
          await DB.deleteUserPricing(btn.dataset.deletePricing);
          _loadPricingList();
          showToast('Pricing entry deleted', 'success');
        });
      });
    } catch (e) {
      container.innerHTML = `<p style="font-size:13px;color:var(--color-danger)">Failed to load pricing</p>`;
    }
  }

  function _bindSettingsEvents() {
    // Sync All
    document.getElementById('sync-all-settings-btn')?.addEventListener('click', async () => {
      const synced = await _syncFromStaticJSON();
      if (synced) showToast('Sync complete for all T1 connectors', 'success');
    });

    // Per-connector sync buttons
    document.querySelectorAll('[data-sync]').forEach(btn => {
      btn.addEventListener('click', async () => {
        btn.disabled = true;
        try {
          const synced = await _syncFromStaticJSON();
          if (synced) showToast(`Sync complete for ${btn.dataset.sync}`, 'success');
        } catch (e) {
          showToast('Sync failed: ' + e.message, 'error');
        } finally {
          btn.disabled = false;
        }
      });
    });

    // Per-connector import buttons (T3 / HarmBench)
    document.querySelectorAll('[data-import]').forEach(btn => {
      btn.addEventListener('click', async () => {
        const fileContent = await _pickFile('.json');
        if (!fileContent) return;
        try {
          showToast(`Import for ${btn.dataset.import} \u2014 parsing\u2026`, 'info');
          const parsed = JSON.parse(fileContent);
          // Attempt to upsert scores directly if they are in the expected format
          if (parsed.scores && Array.isArray(parsed.scores)) {
            await DB.upsertScores(parsed.scores);
            showToast(`Imported ${parsed.scores.length} scores for ${btn.dataset.import}`, 'success');
          } else {
            showToast('Import file does not contain a scores array', 'warning');
          }
        } catch (e) {
          showToast('Import failed: ' + e.message, 'error');
        }
      });
    });

    // DB Backup
    document.getElementById('backup-btn')?.addEventListener('click', async () => {
      try {
        const data = await DB.exportAll();
        _downloadFile('modelindex-backup-' + new Date().toISOString().slice(0,10) + '.json',
          JSON.stringify(data, null, 2), 'application/json');
        showToast('Backup downloaded', 'success');
      } catch(e) { showToast('Backup failed: ' + e.message, 'error'); }
    });

    // DB Restore
    document.getElementById('restore-btn')?.addEventListener('click', async () => {
      const confirmed = confirm('Restoring will replace your current database. Continue?');
      if (!confirmed) return;
      try {
        const content = await _pickFile('.json');
        if (!content) return;
        const data = JSON.parse(content);
        await DB.importAll(data);
        showToast('Database restored. Refreshing\u2026', 'success');
        setTimeout(() => location.reload(), 1000);
      } catch(e) { showToast('Restore failed: ' + e.message, 'error'); }
    });

    // Import Index
    document.getElementById('import-index-btn')?.addEventListener('click', async () => {
      const content = await _pickFile('.json,.modelindex-indexes');
      if (!content) return;
      try {
        const parsed = JSON.parse(content);
        await _importIndex(parsed);
      } catch (e) {
        showToast('Import failed: ' + e.message, 'error');
      }
    });
  }

  async function _importIndex(raw) {
    const schema  = App.state.factorSchema || [];
    const allFactorIds = new Set(schema.map(f => f.factor_id));

    // Accept single object or array of indexes
    const items = Array.isArray(raw) ? raw : [raw];
    let imported = 0;

    for (const item of items) {
      if (!item.name || !item.factor_weights) {
        showToast('Skipped: missing name or factor_weights', 'warning');
        continue;
      }
      // Validate factor keys
      const unknownFactors = Object.keys(item.factor_weights).filter(k => !allFactorIds.has(k));
      if (unknownFactors.length > 0) {
        showToast(`Warning: unknown factors: ${unknownFactors.join(', ')}`, 'warning');
      }
      // Check model IDs (non-fatal if missing — just flag them)
      const models = await DB.getModels();
      const knownIds = new Set(models.map(m => m.model_id));
      const missing = (item.selected_models || []).filter(id => !knownIds.has(id));
      if (missing.length > 0) {
        showToast(`${missing.length} model(s) not in registry will be skipped`, 'warning');
      }

      await DB.saveIndex({
        name:            item.name,
        use_case_preset: item.use_case_preset || 'imported',
        factor_weights:  item.factor_weights,
        hard_constraints:item.hard_constraints || {},
        selected_models: (item.selected_models || []).filter(id => knownIds.has(id)),
        index_mode:      item.index_mode || 'weighted',
        source:          'imported',
      });
      imported++;
    }

    showToast(`Imported ${imported} index(es)`, 'success');
  }

  // ── Public API ───────────────────────────────────────────────────────────────

  App.views.settings = {
    mount() {},
    onEnter() { _render(); },
  };
})();
</script>
</body>
</html>
