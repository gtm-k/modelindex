<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ModelIndex</title>

  <!--
    Content-Security-Policy
    script-src: 'self' + CDN (Chart.js via cdn.jsdelivr.net)
    style-src:  'self' + Google Fonts + unsafe-inline (required for inline <style>)
    connect-src: 'self' only — all data is same-origin static JSON
  -->
  <meta http-equiv="Content-Security-Policy" content="
    default-src 'self';
    script-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net;
    style-src 'self' https://fonts.googleapis.com 'unsafe-inline';
    font-src https://fonts.gstatic.com;
    img-src 'self' data: https:;
    connect-src 'self';
  " />

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />

  <!-- Chart.js -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.4/dist/chart.umd.min.js"></script>

  <!-- Lucide Icons (IIFE build) -->
  <script src="https://cdn.jsdelivr.net/npm/lucide@0.441.0/dist/umd/lucide.min.js"></script>

  <style>
    /* ── Design Tokens ──────────────────────────────────────────────────────── */
    :root {
      --color-bg:           #f8f9fb;
      --color-surface:      #ffffff;
      --color-surface-2:    #f1f3f6;
      --color-border:       #e2e6ec;
      --color-border-2:     #ccd2db;
      --color-text:         #0f1117;
      --color-text-2:       #4a5568;
      --color-text-3:       #8a94a6;
      --color-accent:       #3b5bdb;
      --color-accent-hover: #2f4ac7;
      --color-accent-light: #eef1fd;
      --color-success:      #2f9e44;
      --color-success-bg:   #ebfbee;
      --color-warning:      #e67700;
      --color-warning-bg:   #fff3bf;
      --color-danger:       #c92a2a;
      --color-danger-bg:    #fff5f5;
      --color-neutral:      #495057;

      /* Factor group colours */
      --factor-reasoning:   #6741d9;
      --factor-factuality:  #1971c2;
      --factor-safety:      #2f9e44;
      --factor-coding:      #f76707;
      --factor-agentic:     #e64980;
      --factor-instruction: #0c8599;
      --factor-efficiency:  #5c7cfa;
      --factor-bias:        #862e9c;
      --factor-context:     #087f5b;
      --factor-multimodal:  #c2255c;

      /* Spacing */
      --space-1: 4px;
      --space-2: 8px;
      --space-3: 12px;
      --space-4: 16px;
      --space-5: 20px;
      --space-6: 24px;
      --space-8: 32px;
      --space-10: 40px;

      /* Typography */
      --font-ui:   'Inter', system-ui, sans-serif;
      --font-mono: 'JetBrains Mono', 'Cascadia Code', monospace;

      /* Radii */
      --radius-sm: 4px;
      --radius:    6px;
      --radius-lg: 10px;
      --radius-xl: 16px;

      /* Shadows */
      --shadow-sm: 0 1px 3px rgba(0,0,0,.08);
      --shadow:    0 2px 8px rgba(0,0,0,.10);
      --shadow-lg: 0 8px 24px rgba(0,0,0,.12);

      /* Sidebar */
      --sidebar-width: 220px;
    }

    [data-theme="dark"] {
      --color-bg:           #0f1117;
      --color-surface:      #1a1d27;
      --color-surface-2:    #242838;
      --color-border:       #2d3348;
      --color-border-2:     #3d4560;
      --color-text:         #e8ecf4;
      --color-text-2:       #8a94a6;
      --color-text-3:       #555e75;
      --color-accent:       #5c7cfa;
      --color-accent-hover: #748ffb;
      --color-accent-light: #1a2040;
      --color-success:      #40c057;
      --color-success-bg:   #0d2b13;
      --color-warning:      #fab005;
      --color-warning-bg:   #2b1f00;
      --color-danger:       #ff6b6b;
      --color-danger-bg:    #2b0d0d;
    }

    /* ── Reset & Base ───────────────────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      font-family: var(--font-ui);
      font-size: 14px;
      color: var(--color-text);
      background: var(--color-bg);
      -webkit-font-smoothing: antialiased;
    }

    a { color: var(--color-accent); text-decoration: none; }
    a:hover { text-decoration: underline; }

    button {
      font-family: var(--font-ui);
      font-size: 13px;
      cursor: pointer;
      border: none;
      border-radius: var(--radius);
      padding: var(--space-2) var(--space-3);
      transition: background 0.15s, color 0.15s, opacity 0.15s;
    }
    button:disabled { opacity: 0.45; cursor: not-allowed; }

    .btn-primary {
      background: var(--color-accent);
      color: #fff;
    }
    .btn-primary:hover:not(:disabled) { background: var(--color-accent-hover); }

    .btn-secondary {
      background: var(--color-surface-2);
      color: var(--color-text);
      border: 1px solid var(--color-border);
    }
    .btn-secondary:hover:not(:disabled) { background: var(--color-border); }

    .btn-ghost {
      background: transparent;
      color: var(--color-text-2);
    }
    .btn-ghost:hover:not(:disabled) { background: var(--color-surface-2); }

    .btn-danger {
      background: var(--color-danger-bg);
      color: var(--color-danger);
      border: 1px solid var(--color-danger);
    }
    .btn-danger:hover:not(:disabled) { background: var(--color-danger); color: #fff; }

    input, select, textarea {
      font-family: var(--font-ui);
      font-size: 13px;
      color: var(--color-text);
      background: var(--color-surface);
      border: 1px solid var(--color-border);
      border-radius: var(--radius);
      padding: var(--space-2) var(--space-3);
      outline: none;
      transition: border-color 0.15s;
    }
    input:focus, select:focus, textarea:focus {
      border-color: var(--color-accent);
      box-shadow: 0 0 0 2px var(--color-accent-light);
    }

    code, .mono { font-family: var(--font-mono); font-size: 12px; }

    .hidden { display: none !important; }

    /* ── Layout ─────────────────────────────────────────────────────────────── */
    #app {
      display: flex;
      height: 100vh;
      overflow: hidden;
    }

    /* ── Sidebar ────────────────────────────────────────────────────────────── */
    #sidebar {
      width: var(--sidebar-width);
      background: var(--color-surface);
      border-right: 1px solid var(--color-border);
      display: flex;
      flex-direction: column;
      flex-shrink: 0;
      overflow: hidden;
    }

    #sidebar-header {
      padding: var(--space-4) var(--space-4) var(--space-3);
      border-bottom: 1px solid var(--color-border);
      display: flex;
      align-items: center;
      gap: var(--space-2);
    }
    #sidebar-header .logo-text {
      font-size: 15px;
      font-weight: 600;
      letter-spacing: -0.3px;
    }
    #sidebar-header .logo-badge {
      font-size: 10px;
      font-family: var(--font-mono);
      background: var(--color-accent-light);
      color: var(--color-accent);
      border-radius: var(--radius-sm);
      padding: 1px 5px;
    }

    #sidebar-nav {
      flex: 1;
      padding: var(--space-3) var(--space-2);
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .nav-item {
      display: flex;
      align-items: center;
      gap: var(--space-2);
      padding: var(--space-2) var(--space-3);
      border-radius: var(--radius);
      cursor: pointer;
      color: var(--color-text-2);
      font-size: 13px;
      font-weight: 500;
      transition: background 0.12s, color 0.12s;
      user-select: none;
    }
    .nav-item:hover { background: var(--color-surface-2); color: var(--color-text); }
    .nav-item.active { background: var(--color-accent-light); color: var(--color-accent); }
    .nav-item svg { width: 16px; height: 16px; flex-shrink: 0; }

    #sidebar-footer {
      padding: var(--space-3) var(--space-4);
      border-top: 1px solid var(--color-border);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    #sync-status-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--color-success);
      transition: background 0.3s;
    }
    #sync-status-dot.stale   { background: var(--color-warning); }
    #sync-status-dot.error   { background: var(--color-danger); }
    #sync-status-dot.syncing { background: var(--color-accent); animation: pulse 1s infinite; }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.4; }
    }

    /* ── Main Content ────────────────────────────────────────────────────────── */
    #main-content {
      flex: 1;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    .view {
      flex: 1;
      overflow: auto;
      padding: var(--space-6);
    }

    .view-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: var(--space-5);
    }

    .view-title {
      font-size: 18px;
      font-weight: 600;
      letter-spacing: -0.3px;
    }

    .view-subtitle {
      font-size: 13px;
      color: var(--color-text-2);
      margin-top: var(--space-1);
    }

    /* ── Cards & Surfaces ────────────────────────────────────────────────────── */
    .card {
      background: var(--color-surface);
      border: 1px solid var(--color-border);
      border-radius: var(--radius-lg);
      padding: var(--space-5);
    }

    /* ── Badges ─────────────────────────────────────────────────────────────── */
    .badge {
      display: inline-flex;
      align-items: center;
      gap: 3px;
      font-size: 11px;
      font-weight: 500;
      border-radius: var(--radius-sm);
      padding: 2px 6px;
    }
    .badge-green   { background: var(--color-success-bg); color: var(--color-success); }
    .badge-yellow  { background: var(--color-warning-bg); color: var(--color-warning); }
    .badge-red     { background: var(--color-danger-bg);  color: var(--color-danger); }
    .badge-neutral { background: var(--color-surface-2);  color: var(--color-text-2); }
    .badge-accent  { background: var(--color-accent-light); color: var(--color-accent); }

    /* ── Score Progress Bar ──────────────────────────────────────────────────── */
    .score-bar {
      display: flex;
      align-items: center;
      gap: var(--space-2);
    }
    .score-bar-track {
      flex: 1;
      height: 5px;
      background: var(--color-surface-2);
      border-radius: 99px;
      overflow: hidden;
    }
    .score-bar-fill {
      height: 100%;
      border-radius: 99px;
      background: var(--color-accent);
      transition: width 0.3s ease;
    }
    .score-value {
      font-family: var(--font-mono);
      font-size: 12px;
      color: var(--color-text-2);
      min-width: 32px;
      text-align: right;
    }

    /* ── Toast ───────────────────────────────────────────────────────────────── */
    #toast-container {
      position: fixed;
      bottom: var(--space-5);
      right: var(--space-5);
      display: flex;
      flex-direction: column;
      gap: var(--space-2);
      z-index: 9999;
    }

    .toast {
      background: var(--color-surface);
      border: 1px solid var(--color-border);
      border-radius: var(--radius-lg);
      padding: var(--space-3) var(--space-4);
      box-shadow: var(--shadow-lg);
      font-size: 13px;
      max-width: 320px;
      display: flex;
      align-items: flex-start;
      gap: var(--space-2);
      animation: slideIn 0.2s ease;
    }
    .toast.success { border-left: 3px solid var(--color-success); }
    .toast.error   { border-left: 3px solid var(--color-danger); }
    .toast.warning { border-left: 3px solid var(--color-warning); }

    @keyframes slideIn {
      from { transform: translateX(20px); opacity: 0; }
      to   { transform: translateX(0);    opacity: 1; }
    }

    /* ── Modal ───────────────────────────────────────────────────────────────── */
    #modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.45);
      z-index: 1000;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .modal {
      background: var(--color-surface);
      border-radius: var(--radius-xl);
      box-shadow: var(--shadow-lg);
      width: 100%;
      max-height: 85vh;
      overflow-y: auto;
      animation: modalIn 0.2s ease;
    }
    @keyframes modalIn {
      from { transform: scale(0.96); opacity: 0; }
      to   { transform: scale(1);    opacity: 1; }
    }

    .modal-header {
      padding: var(--space-5) var(--space-6);
      border-bottom: 1px solid var(--color-border);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .modal-title { font-size: 15px; font-weight: 600; }
    .modal-body  { padding: var(--space-5) var(--space-6); }
    .modal-footer {
      padding: var(--space-4) var(--space-6);
      border-top: 1px solid var(--color-border);
      display: flex;
      justify-content: flex-end;
      gap: var(--space-2);
    }

    /* ── Skeleton Loader ─────────────────────────────────────────────────────── */
    .skeleton {
      background: linear-gradient(90deg, var(--color-surface-2) 25%, var(--color-border) 50%, var(--color-surface-2) 75%);
      background-size: 200% 100%;
      animation: shimmer 1.4s infinite;
      border-radius: var(--radius);
    }
    @keyframes shimmer {
      from { background-position: 200% 0; }
      to   { background-position: -200% 0; }
    }

    /* ── Slide-out Panel ─────────────────────────────────────────────────────── */
    .panel {
      position: fixed;
      top: 0; right: 0;
      height: 100vh;
      background: var(--color-surface);
      border-left: 1px solid var(--color-border);
      box-shadow: var(--shadow-lg);
      z-index: 500;
      overflow-y: auto;
      transition: transform 0.25s ease;
    }
    .panel.hidden { transform: translateX(100%); }

    /* ── Pill Filters ────────────────────────────────────────────────────────── */
    .pill-row {
      display: flex;
      gap: var(--space-2);
      flex-wrap: wrap;
    }
    .pill {
      font-size: 12px;
      font-weight: 500;
      padding: 4px 10px;
      border-radius: 99px;
      border: 1px solid var(--color-border);
      background: var(--color-surface);
      color: var(--color-text-2);
      cursor: pointer;
      transition: all 0.12s;
    }
    .pill:hover  { border-color: var(--color-accent); color: var(--color-accent); }
    .pill.active { border-color: var(--color-accent); background: var(--color-accent-light); color: var(--color-accent); }

    /* ── Spin animation ─────────────────────────────────────────────────────── */
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Placeholder views ───────────────────────────────────────────────────── */
    .placeholder-view {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 60vh;
      color: var(--color-text-3);
      gap: var(--space-3);
    }
    .placeholder-view svg { width: 48px; height: 48px; opacity: 0.3; }
    .placeholder-view p   { font-size: 15px; }

    /* Domain tabs */
    .domain-tab:hover { background: var(--color-bg-2) !important; }
    .domain-tab.active { font-weight: 600; }

    /* ── Mobile: <= 768px ──────────────────────────────────────────────── */
    @media (max-width: 768px) {
      #sidebar { display: none; }
      #mobile-tab-bar {
        display: flex;
        position: fixed;
        bottom: 0;
        left: 0;
        right: 0;
        height: 56px;
        background: var(--color-surface);
        border-top: 1px solid var(--color-border);
        z-index: 100;
        justify-content: space-around;
        align-items: center;
        padding-bottom: env(safe-area-inset-bottom, 0);
      }
      .mob-tab {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 2px;
        padding: 6px 12px;
        background: none;
        border: none;
        color: var(--color-text-3);
        font-size: 10px;
        cursor: pointer;
        min-width: 44px;
        min-height: 44px;
        justify-content: center;
      }
      .mob-tab.active { color: var(--color-primary); }
      .mob-tab svg { width: 20px; height: 20px; }

      #main-content { padding-bottom: 56px; }
      .view { padding: 16px; }

      /* Domain tabs: horizontal scroll */
      .domain-tabs {
        overflow-x: auto !important;
        white-space: nowrap !important;
        -webkit-overflow-scrolling: touch;
        flex-wrap: nowrap !important;
      }

      /* Preset/best-for row: horizontal scroll */
      #best-for-row {
        overflow-x: auto !important;
        white-space: nowrap !important;
        -webkit-overflow-scrolling: touch;
        flex-wrap: nowrap !important;
      }

      /* Toolbar: icon-only buttons */
      .view-header { flex-wrap: wrap; gap: 8px; }
      .view-header .btn-secondary span.btn-label { display: none; }
      .view-header .btn-secondary { padding: 8px; min-width: 36px; min-height: 36px; }

      /* Registry layout: stack vertically, hide filter panel */
      #registry-layout { flex-direction: column; }
      #registry-filter-panel { display: none; }

      /* Table hidden, cards shown on mobile */
      .registry-table-wrap { display: none; }
      .model-card-list { display: block; }

      /* Filter FAB */
      .filter-fab {
        display: flex;
        position: fixed;
        bottom: 72px;
        right: 16px;
        z-index: 90;
        background: var(--color-primary);
        color: #fff;
        border: none;
        border-radius: 28px;
        padding: 10px 18px;
        font-size: 13px;
        font-weight: 600;
        align-items: center;
        gap: 6px;
        box-shadow: var(--shadow-lg);
        cursor: pointer;
        min-height: 44px;
      }
      .filter-fab svg { width: 16px; height: 16px; }
      .filter-badge {
        background: var(--color-danger, #e74c3c);
        color: #fff;
        border-radius: 10px;
        font-size: 11px;
        padding: 1px 6px;
        margin-left: 2px;
      }

      /* Bottom sheet (filters + provenance) */
      .bottom-sheet-backdrop {
        display: none;
        position: fixed;
        inset: 0;
        background: rgba(0,0,0,0.4);
        z-index: 200;
      }
      .bottom-sheet-backdrop.open { display: block; }
      .bottom-sheet {
        position: fixed;
        bottom: 0;
        left: 0;
        right: 0;
        max-height: 75vh;
        background: var(--color-surface);
        border-radius: var(--radius-xl) var(--radius-xl) 0 0;
        box-shadow: var(--shadow-lg);
        z-index: 201;
        transform: translateY(100%);
        transition: transform 0.3s ease;
        overflow-y: auto;
        padding: 20px;
      }
      .bottom-sheet.open { transform: translateY(0); }
      .bottom-sheet-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 16px;
        padding-bottom: 12px;
        border-bottom: 1px solid var(--color-border);
      }
      .bottom-sheet-header h3 { margin: 0; font-size: 16px; }

      /* Provenance panel → bottom sheet on mobile */
      #provenance-panel {
        position: fixed !important;
        bottom: 0 !important;
        left: 0 !important;
        right: 0 !important;
        top: auto !important;
        width: 100% !important;
        max-height: 80vh;
        border-radius: var(--radius-xl) var(--radius-xl) 0 0;
        transform: translateY(100%);
        transition: transform 0.3s ease;
        z-index: 201;
      }
      #provenance-panel:not(.hidden) { transform: translateY(0); }

      /* Modal: full width on mobile */
      .modal { max-width: calc(100vw - 32px) !important; }

      /* Mobile cards */
      .model-card-list {
        display: flex;
        flex-direction: column;
        gap: 12px;
      }
      .mob-card {
        background: var(--color-surface);
        border: 1px solid var(--color-border);
        border-radius: var(--radius-lg);
        padding: 14px;
        cursor: pointer;
      }
      .mob-card-top {
        display: flex;
        justify-content: space-between;
        align-items: flex-start;
        margin-bottom: 8px;
      }
      .mob-card-name { font-weight: 600; font-size: 14px; }
      .mob-card-provider { font-size: 12px; color: var(--color-text-3); }
      .mob-card-mcs {
        font-size: 18px;
        font-weight: 700;
        color: var(--color-primary);
        line-height: 1;
      }
      .mob-card-mcs small {
        display: block;
        font-size: 10px;
        font-weight: 400;
        color: var(--color-text-3);
        margin-top: 2px;
      }
      .mob-card-tags {
        display: flex;
        gap: 6px;
        flex-wrap: wrap;
        margin-top: 6px;
      }
      .mob-card-factors {
        display: none;
        margin-top: 12px;
        padding-top: 12px;
        border-top: 1px solid var(--color-border);
      }
      .mob-card.expanded .mob-card-factors { display: block; }
      .mob-card-factor-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 8px;
      }
      .mob-card-factor {
        display: flex;
        justify-content: space-between;
        align-items: center;
        font-size: 12px;
        padding: 4px 0;
      }
      .mob-card-factor-label {
        display: flex;
        align-items: center;
        gap: 4px;
        color: var(--color-text-2);
      }
      .mob-card-factor-dot {
        width: 6px;
        height: 6px;
        border-radius: 50%;
      }
      .mob-card-expand-hint {
        text-align: center;
        font-size: 11px;
        color: var(--color-text-3);
        margin-top: 6px;
      }
      .mob-card.expanded .mob-card-expand-hint { display: none; }

      /* Index Builder: horizontal stepper */
      #wizard-shell { flex-direction: column !important; gap: 16px !important; }
      #wizard-steps {
        width: 100% !important;
        flex-direction: row !important;
        justify-content: center;
        gap: 8px !important;
      }
      .wizard-step-item {
        width: 32px !important;
        height: 32px !important;
        border-radius: 50% !important;
        padding: 0 !important;
        justify-content: center !important;

const App = {

// ── Browser helper: file download ─────────────────────────────────────────────
function _downloadFile(filename, content, mimeType) {
  const blob = new Blob([content], { type: mimeType || 'text/plain' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = filename;
  document.body.appendChild(a); a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

// ── Browser helper: file picker ───────────────────────────────────────────────
function _pickFile(accept) {
  return new Promise(resolve => {
    const input = document.createElement('input');
    input.type = 'file';
    input.accept = accept || '.json';
    input.onchange = () => {
      const file = input.files[0];
      if (!file) { resolve(null); return; }
      const reader = new FileReader();
      reader.onload = () => resolve(reader.result);
      reader.readAsText(file);
    };
    input.click();
  });
}

// ── Static connector statuses from manifest.json ──────────────────────────────
async function _getConnectorStatuses() {
  try {
    const manifest = await fetch('data/scores/manifest.json').then(r => r.json());
    return Object.entries(manifest).map(([id, info]) => ({
      connectorId: id, displayName: id, tier: 'T1',
      schedule: '*/6 * * *', isRunning: false,
      lastSync: info.fetched_at ? { finished_at: info.fetched_at, status: info.error ? 'error' : 'success', rows_upserted: info.count, error_msg: info.error || null } : null,
    }));
  } catch { return []; }
}

// ── Static data sync: fetch JSON files and upsert into IndexedDB ──────────────
const SYNC_COOLDOWN_MS = 24 * 60 * 60 * 1000; // 24 hours

async function _syncFromStaticJSON(opts = {}) {
  const force = opts.force || false; // force bypasses cooldown (used on first load)
  const dot = document.getElementById('sync-status-dot');
  const label = document.getElementById('sync-status-label');

  // Rate limit: once per day for user-triggered syncs
  if (!force) {
    const lastSync = localStorage.getItem('modelindex_last_sync');
    if (lastSync) {
      const elapsed = Date.now() - parseInt(lastSync, 10);
      if (elapsed < SYNC_COOLDOWN_MS) {
        const hoursLeft = Math.ceil((SYNC_COOLDOWN_MS - elapsed) / (60 * 60 * 1000));
        showToast(`Data syncs once daily. Next sync available in ~${hoursLeft}h.`, 'info');
        return false;
      }
    }
  }

  if (dot) dot.className = 'syncing';
  if (label) label.textContent = 'Syncing\u2026';
  try {
    const manifest = await fetch('data/scores/manifest.json').then(r => r.json());
    for (const [connectorId, info] of Object.entries(manifest)) {
      if (info.error || !info.fetched_at) continue;
      try {
        const data = await fetch(`data/scores/${connectorId}.json`).then(r => r.json());
        if (data.scores && data.scores.length > 0) {
          await DB.upsertScores(data.scores);
          await DB.logSync(connectorId, 'success', data.scores.length, data.scores.length, null);
        }
      } catch (e) {
        await DB.logSync(connectorId, 'error', 0, 0, e.message);
      }
    }
    localStorage.setItem('modelindex_last_sync', Date.now().toString());
    if (dot) dot.className = '';
    if (label) label.textContent = 'Synced';
    if (App.state.currentView === 'registry' && App.views.registry) App.views.registry.refresh();
    return true;
  } catch (e) {
    if (dot) dot.className = 'error';
    if (label) label.textContent = 'Error';
    return false;
  }
}

// ── Flatten nested baseline into flat { sub_metric_id: { min, max, invert } }
function _flattenBaseline(nested) {
  const flat = {};
  for (const [factorId, subs] of Object.entries(nested)) {
    if (factorId === '_meta') continue;
    for (const [subId, spec] of Object.entries(subs)) {
      flat[subId] = { ...spec, factor_id: factorId };
    }
  }
  return flat;
}

// ── Utility functions ──────────────────────────────────────────────────────────
function showView(viewId) {
  document.querySelectorAll('.view').forEach(v => v.classList.add('hidden'));
  document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));

  const view = document.getElementById(`view-${viewId}`);
  const nav  = document.getElementById(`nav-${viewId}`);
  if (view) view.classList.remove('hidden');
  if (nav)  nav.classList.add('active');

  // Sync mobile tab bar
  document.querySelectorAll('.mob-tab').forEach(t => t.classList.remove('active'));
  const mobTab = document.querySelector(`.mob-tab[data-view="${viewId}"]`);
  if (mobTab) mobTab.classList.add('active');

  App.state.currentView = viewId;
  if (App.views[viewId] && App.views[viewId].onEnter) {
    App.views[viewId].onEnter();
  }
}

function switchDomain(domainId) {
  App.state.activeDomain = domainId;
  App.state.factorSchema = Factors.getSchemaForDomain(domainId);
  if (domainId === 'llm') {
    App.state.baseline = App.state._llmBaseline;
  } else {
    App.state.baseline = App.state.domainBaselines[domainId] || {};
  }
  // Inject factor color CSS vars for the new domain
  const schema = App.state.factorSchema;
  if (schema) {
    const root = document.documentElement;
    schema.forEach(f => root.style.setProperty(`--factor-${f.factor_id}`, f.color));
  }
  if (App.state.currentView === 'registry' && App.views.registry) {
    App.views.registry.refresh();
  }
  document.querySelectorAll('.domain-tab').forEach(tab => {
    tab.classList.toggle('active', tab.dataset.domain === domainId);
  });
}

function showToast(message, type = 'info', duration = 3500) {
  const container = document.getElementById('toast-container');
  const toast = document.createElement('div');
  toast.className = `toast ${type}`;
  toast.textContent = message;
  container.appendChild(toast);
  setTimeout(() => toast.remove(), duration);
}

let _modalCleanup = null;
function showModal(html, widthPx = 520) {
  const overlay = document.getElementById('modal-overlay');
  overlay.innerHTML = `<div class="modal" style="max-width:${widthPx}px">${html}</div>`;
  overlay.classList.remove('hidden');
  overlay.addEventListener('click', (e) => {
    if (e.target === overlay) closeModal();
  }, { once: true });
}
function closeModal() {
  const overlay = document.getElementById('modal-overlay');
  overlay.classList.add('hidden');
  overlay.innerHTML = '';
  if (_modalCleanup) { _modalCleanup(); _modalCleanup = null; }
}

function showLoading(containerId) {
  const el = document.getElementById(containerId);
  if (el) el.innerHTML = `
    <div class="placeholder-view">
      <i data-lucide="loader-2" style="animation:spin 1s linear infinite"></i>
    </div>`;
  lucide.createIcons();
}

function formatScore(n) {
  if (n == null || n === undefined || isNaN(n)) return '\u2014';
  return Number(n).toFixed(1);
}

function scoreBar(value, color) {
  const pct = Math.max(0, Math.min(100, value || 0));
  return `
    <div class="score-bar">
      <div class="score-bar-track">
        <div class="score-bar-fill" style="width:${pct}%;background:${color || 'var(--color-accent)'}"></div>
      </div>
      <span class="score-value">${formatScore(value)}</span>
    </div>`;
}

function stalenessClass(fetchedAt) {
  if (!fetchedAt) return 'stale';
  const ageH = (Date.now() - fetchedAt) / 3600000;
  if (ageH < 6)  return 'fresh';
  if (ageH < 48) return 'aging';
  if (ageH < 168) return 'stale';
  return 'expired';
}

function stalenessBadge(fetchedAt) {
  const cls = stalenessClass(fetchedAt);
  const map = {
    fresh:   ['badge-green',   'Fresh'],
    aging:   ['badge-yellow',  'Aging'],
    stale:   ['badge-yellow',  'Stale'],
    expired: ['badge-red',     'Expired'],
  };
  const [badgeCls, label] = map[cls] || ['badge-neutral', '\u2014'];
  return `<span class="badge ${badgeCls}">${label}</span>`;
}

// ── Theme toggle ───────────────────────────────────────────────────────────────
(function initTheme() {
  const saved = localStorage.getItem('theme');
  const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
  const theme = saved || (prefersDark ? 'dark' : 'light');
  document.documentElement.setAttribute('data-theme', theme);

  document.getElementById('theme-toggle').addEventListener('click', () => {
    const current = document.documentElement.getAttribute('data-theme');
    const next = current === 'dark' ? 'light' : 'dark';
    document.documentElement.setAttribute('data-theme', next);
    localStorage.setItem('theme', next);
    // Swap icon
    const icon = document.querySelector('#theme-toggle i');
    if (icon) icon.setAttribute('data-lucide', next === 'dark' ? 'moon' : 'sun');
    lucide.createIcons();
  });
})();

document.querySelectorAll('.nav-item[data-view]').forEach(item => {

// ── Keyboard: Escape closes modal / panel ─────────────────────────────────────
document.addEventListener('keydown', (e) => {
  if (e.key !== 'Escape') return;
  const panel = document.getElementById('provenance-panel');
  if (!panel.classList.contains('hidden')) { panel.classList.add('hidden'); document.getElementById('provenance-backdrop')?.classList.remove('open'); return; }
  const overlay = document.getElementById('modal-overlay');
  if (!overlay.classList.contains('hidden')) closeModal();
});

// ── App initialisation ────────────────────────────────────────────────────────
(async function init() {
  try {
    // Initialize IndexedDB
    await DB.init();

    // Load static data needed by multiple views
    const [baselineRaw, licenseCompat, hardwareManifest, registryData] = await Promise.all([
      fetch('data/baseline.json').then(r => r.json()),
      fetch('data/license-compat.json').then(r => r.json()),
      fetch('data/hardware.json').then(r => r.json()),
      fetch('data/registry.json').then(r => r.json()),
    ]);

    // Flatten nested baseline for inline MCS computation
    App.state.baseline         = _flattenBaseline(baselineRaw);
    App.state._llmBaseline     = App.state.baseline;
    App.state.baselineRaw      = baselineRaw; // keep nested version for MCS module
    App.state.factorSchema     = Factors.FACTOR_SCHEMA;

    // Load domain baselines
    for (const domainId of ['robotics', 'weather', 'materials']) {
      try {
        const domainBaseline = await fetch(`data/baseline-${domainId}.json`).then(r => r.json());
        App.state.domainBaselines[domainId] = _flattenBaseline(domainBaseline);
      } catch (e) {
        console.warn(`Could not load baseline for ${domainId}:`, e.message);
      }
    }
    App.state.presets          = Presets.PRESETS;
    App.state.licenseCompat    = licenseCompat;
    App.state.hardwareManifest = hardwareManifest.models || hardwareManifest;

    // Seed models on first visit
    await DB.seedModels(registryData.models || registryData);

    // Initial data sync from static JSON (force bypasses daily cooldown)
    _syncFromStaticJSON({ force: true });

    // Initialise Lucide icons
    lucide.createIcons();

    // Mount view modules
    if (App.views.registry)         App.views.registry.mount();
    if (App.views['index-builder']) App.views['index-builder'].mount();
    if (App.views['my-indexes'])    App.views['my-indexes'].mount();
    if (App.views.settings)         App.views.settings.mount();

    // Navigate to default view
    showView('registry');

    // Register service worker
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('sw.js').catch(e => console.warn('SW registration failed:', e));
    }
  } catch (err) {
    console.error('Init failed:', err);
    showToast('Failed to initialise app. Check console.', 'error');
  }
})();

  // ── Helpers ─────────────────────────────────────────────────────────────────

  function _computeMCSInline(modelScores, factorWeights) {
    // Pure inline MCS — no IPC round-trip on re-rank
    const baseline = App.state.baseline;
    if (!baseline || !modelScores || modelScores.length === 0) return 0;

    const subScores = {};
    for (const s of modelScores) {
      const b = baseline[s.sub_metric];
      if (!b) continue;
      let n = b.max === b.min ? 50 : ((s.raw_score - b.min) / (b.max - b.min)) * 100;
      n = Math.max(0, Math.min(100, n));
      if (b.invert) n = 100 - n;
      subScores[s.sub_metric] = n;
    }

    let mcs = 0;
    let totalW = 0;
    const schema = App.state.factorSchema || [];
    const weights = factorWeights || {};

    for (const factor of schema) {
      const w = weights[factor.factor_id] || 0;
      if (w === 0) continue;
      const vals = factor.sub_metrics.map(sm => subScores[sm.sub_metric_id]).filter(v => v != null);
      if (vals.length === 0) continue;
      const factorScore = vals.reduce((a, b) => a + b, 0) / vals.length;
      mcs += factorScore * w;
      totalW += w;
    }
    return totalW > 0 ? mcs / totalW : 0;
  }

  function _buildFactorWeightsFromPreset(presetId) {
    const preset = (App.state.presets || []).find(p => p.id === presetId);
    return preset ? preset.factor_weights : null;
  }

  function _buildEqualWeights() {
    const schema = App.state.factorSchema || [];
    const w = {};
    const v = 100 / Math.max(schema.length, 1);
    for (const f of schema) w[f.factor_id] = v;
    return w;
  }

  function _sortModels(models) {
    return [...models].sort((a, b) => {
      let va = a[_sortCol], vb = b[_sortCol];
      if (va == null) va = -Infinity;
      if (vb == null) vb = -Infinity;
      if (typeof va === 'string') return _sortDir === 'asc' ? va.localeCompare(vb) : vb.localeCompare(va);
      return _sortDir === 'asc' ? va - vb : vb - va;
    });
  }

  function _applyFilters(models) {
    return models.filter(m => {
      if (_filters.providers.size > 0 && !_filters.providers.has(m.provider)) return false;
      if (_filters.licenses.size > 0 && !_filters.licenses.has(m.license)) return false;
      const mcs = (m.mcs != null ? m.mcs : 0);
      if (mcs < _filters.mcsMin) return false;
      return true;
    });
  }

  function _enrichWithMCS() {
    const weights = _activePreset
      ? _buildFactorWeightsFromPreset(_activePreset)
      : _buildEqualWeights();

    return _models.map(m => {
      const modelScores = Object.values(_scores[m.model_id] || {});
      const mcs = _computeMCSInline(modelScores, weights);
      const pricing = _pricing[m.model_id] || null;
      return { ...m, mcs, pricing };
    });
  }

  function _getActiveFilterCount() {
    let count = 0;
    if (_filters.providers.size > 0) count += _filters.providers.size;
    if (_filters.licenses.size > 0) count += _filters.licenses.size;
    if (_filters.mcsMin > 0) count++;
    return count;
  }

  // ── Render ───────────────────────────────────────────────────────────────────

  function _renderFilterPanel(allModels) {
    const providers = [...new Set(allModels.map(m => m.provider).filter(Boolean))].sort();
    const licenses  = [...new Set(allModels.map(m => m.license).filter(Boolean))].sort();

    return `
      <div id="registry-filter-panel">
        <div style="font-size:12px;font-weight:600;margin-bottom:var(--space-4)">Filters</div>

        <div class="filter-section">
          <div class="filter-label">Provider</div>
          ${providers.map(p => `
            <label class="filter-check">
              <input type="checkbox" data-filter="provider" value="${p}"
                ${_filters.providers.has(p) ? 'checked' : ''}>
              ${p}
            </label>`).join('')}
        </div>

        <div class="filter-section">
          <div class="filter-label">License</div>
          ${licenses.map(l => `
            <label class="filter-check">
              <input type="checkbox" data-filter="license" value="${l}"
                ${_filters.licenses.has(l) ? 'checked' : ''}>
              ${l}
            </label>`).join('')}
        </div>

        <div class="filter-section">
          <div class="filter-label">Min MCS: <span id="mcs-threshold-val">${_filters.mcsMin}</span></div>
          <input type="range" min="0" max="100" step="5" value="${_filters.mcsMin}" id="mcs-threshold"
            style="width:100%;margin-top:4px;accent-color:var(--color-accent)">
        </div>

        <div class="filter-section">
          <label class="filter-check">
            <input type="checkbox" id="hw-toggle" ${_showHardware ? 'checked' : ''}>
            Show hardware req.
          </label>
        </div>

        <button class="btn-secondary" id="clear-filters-btn"
          style="width:100%;margin-top:var(--space-2)">Clear filters</button>

        <button class="btn-secondary" id="license-compat-btn"
          style="width:100%;margin-top:var(--space-2)">
          <i data-lucide="shield-check" style="width:13px;height:13px;vertical-align:-2px"></i>
          License Checker
        </button>
      </div>`;
  }

  function _renderBestForRow() {
    const presets = (App.state.presets || []).filter(p => p.domain === App.state.activeDomain);
    const pills = [{ id: null, label: 'All (Equal weights)' }, ...presets.map(p => ({ id: p.id, label: p.label }))];
    return `
      <div id="best-for-row">
        ${pills.map(p => `
          <span class="pill ${_activePreset === p.id ? 'active' : ''}" data-preset="${p.id || ''}">
            ${p.label}
          </span>`).join('')}
      </div>`;
  }

  function _renderTable(enriched) {
    const schema = App.state.factorSchema || [];
    const hwManifest = App.state.hardwareManifest || {};
    const sortArrow = (col) => col === _sortCol ? (_sortDir === 'asc' ? ' \u2191' : ' \u2193') : '';

    const factorHeaders = schema.map(f =>
      `<th class="${_sortCol === f.factor_id ? 'sorted' : ''}"
          data-sort="${f.factor_id}"
          title="${f.label} — ${f.description || ''}"
          style="color:var(--color-text-3);min-width:70px">
        <span style="display:inline-block;width:8px;height:8px;border-radius:50%;
          background:var(--factor-${f.factor_id});margin-right:4px"></span>
        ${f.label.split(/[&,]/)[0].trim()}${sortArrow(f.factor_id)}
      </th>`).join('');

    const rows = enriched.map(m => {
      const modelScores = Object.values(_scores[m.model_id] || {});
      const weights = _activePreset
        ? _buildFactorWeightsFromPreset(_activePreset)
        : _buildEqualWeights();

      // Per-factor normalized scores for inline bars
      const factorScores = {};
      const baseline = App.state.baseline || {};
      for (const s of modelScores) {
        const b = baseline[s.sub_metric];
        if (!b) continue;
        let n = b.max === b.min ? 50 : ((s.raw_score - b.min) / (b.max - b.min)) * 100;
        n = Math.max(0, Math.min(100, n));
        if (b.invert) n = 100 - n;
        const factorId = s.factor_group;
        if (!factorScores[factorId]) factorScores[factorId] = [];
        factorScores[factorId].push(n);
      }

      const factorCells = schema.map(f => {
        const vals = factorScores[f.factor_id] || [];
        const avg = vals.length ? vals.reduce((a,b)=>a+b,0)/vals.length : null;
        if (avg == null) return `<td><span style="color:var(--color-text-3)">\u2014</span></td>`;
        return `<td class="score-cell"
          data-model="${m.model_id}" data-factor="${f.factor_id}"
          title="Click for provenance">
          ${scoreBar(avg, `var(--factor-${f.factor_id})`)}
        </td>`;
      }).join('');

      const costHtml = m.pricing
        ? `<span class="cost-cell" data-model="${m.model_id}" title="Edit pricing">
            $${m.pricing.input_cost_per_1m}/${m.pricing.output_cost_per_1m}
          </span>`
        : `<span class="cost-cell" data-model="${m.model_id}" style="color:var(--color-text-3)" title="Enter pricing">
            $\u2014
          </span>`;

      const hwEntry = hwManifest[m.model_id];
      let hwHtml = '';
      if (_showHardware) {
        if (hwEntry?.type === 'api') {
          hwHtml = `<td style="font-size:11px;color:var(--color-text-3)" title="${hwEntry.notes || ''}">
            <span style="color:var(--color-accent)">API</span> $${hwEntry.input_cost_per_1m}/$${hwEntry.output_cost_per_1m}
          </td>`;
        } else if (hwEntry?.vram_min_gb) {
          hwHtml = `<td style="font-size:11px;color:var(--color-text-3)" title="${hwEntry.notes || ''}">
            ${hwEntry.vram_min_gb}GB VRAM
          </td>`;
        } else {
          hwHtml = `<td style="color:var(--color-text-3)">\u2014</td>`;
        }
      }

      const licClass = m.license === 'MIT' || m.license === 'Apache-2.0' ? 'lic-ok'
        : m.license === 'Proprietary' ? 'lic-warn' : 'badge-neutral';

      return `
        <tr data-model-id="${m.model_id}">
          <td style="padding:var(--space-2)">
            <input type="checkbox" class="compare-cb" data-model="${m.model_id}"
              ${_compareSet.has(m.model_id) ? 'checked' : ''}
              style="accent-color:var(--color-accent)">
          </td>
          <td>
            <div class="model-name">${m.name}
              ${m._hasChangelog ? '<span class="updated-badge">\u2191 Updated</span>' : ''}
            </div>
            <div class="model-provider">${m.provider || ''}</div>
          </td>
          <td>${scoreBar(m.mcs, 'var(--color-accent)')}</td>
          ${factorCells}
          <td><span class="badge ${licClass}">${m.license || '\u2014'}</span></td>
          <td>${costHtml}</td>
          ${hwHtml}
        </tr>`;
    }).join('');

    const hwHeader = _showHardware ? `<th title="VRAM for open-weight, API pricing (in/out per 1M tokens) for proprietary">Hardware / Pricing</th>` : '';

    return `
      <div class="registry-table-wrap">
        <table class="registry-table">
          <thead>
            <tr>
              <th style="width:28px;padding:var(--space-2)">
                <input type="checkbox" id="compare-select-all" title="Select all visible"
                  style="accent-color:var(--color-accent)">
              </th>
              <th class="${_sortCol==='name'?'sorted':''}" data-sort="name">Model${sortArrow('name')}</th>
              <th class="${_sortCol==='mcs'?'sorted':''}" data-sort="mcs" style="min-width:120px"
                title="Model Composite Score — weighted aggregate of all factor scores">
                MCS Score${sortArrow('mcs')}
              </th>
              ${factorHeaders}
              <th>License</th>
              <th title="Cost per 1M tokens — enter custom pricing in Settings or click a cost cell to add">Cost/1M tok</th>
              ${hwHeader}
            </tr>
          </thead>
          <tbody>${rows}</tbody>
        </table>
      </div>`;
  }

  function _renderMobileCards(enriched) {
    const schema = App.state.factorSchema || [];
    const baseline = App.state.baseline || {};

    const cards = enriched.map(m => {
      const modelScores = Object.values(_scores[m.model_id] || {});
      const factorScores = {};
      for (const s of modelScores) {
        const b = baseline[s.sub_metric];
        if (!b) continue;
        let n = b.max === b.min ? 50 : ((s.raw_score - b.min) / (b.max - b.min)) * 100;
        n = Math.max(0, Math.min(100, n));
        if (b.invert) n = 100 - n;
        if (!factorScores[s.factor_group]) factorScores[s.factor_group] = [];
        factorScores[s.factor_group].push(n);
      }

      const factorRows = schema.map(f => {
        const vals = factorScores[f.factor_id] || [];
        const avg = vals.length ? vals.reduce((a,b)=>a+b,0)/vals.length : null;
        const display = avg != null ? avg.toFixed(1) : '\u2014';
        return `<div class="mob-card-factor">
          <span class="mob-card-factor-label">
            <span class="mob-card-factor-dot" style="background:var(--factor-${f.factor_id})"></span>
            ${f.label.split(/[&,]/)[0].trim()}
          </span>
          <span style="font-weight:600">${display}</span>
        </div>`;
      }).join('');

      const licClass = m.license === 'MIT' || m.license === 'Apache-2.0' ? 'lic-ok'
        : m.license === 'Proprietary' ? 'lic-warn' : 'badge-neutral';

      return `<div class="mob-card" data-model-id="${m.model_id}">
        <div class="mob-card-top">
          <div>
            <div class="mob-card-name">${m.name}</div>
            <div class="mob-card-provider">${m.provider || ''}</div>
          </div>
          <div class="mob-card-mcs">
            ${m.mcs != null ? m.mcs.toFixed(1) : '\u2014'}
            <small>MCS</small>
          </div>
        </div>
        <div class="mob-card-tags">
          <span class="badge ${licClass}">${m.license || '\u2014'}</span>
        </div>
        <div class="mob-card-expand-hint">Tap for details</div>
        <div class="mob-card-factors">
          <div class="mob-card-factor-grid">
            ${factorRows}
          </div>
        </div>
      </div>`;
    }).join('');

    return `<div class="model-card-list">${cards}</div>`;
  }

  function _renderDomainTabs() {
    const meta = (typeof DomainSchemas !== 'undefined' && DomainSchemas.DOMAIN_META) ? DomainSchemas.DOMAIN_META : {};
    const domains = Object.values(meta);
    if (domains.length === 0) return '';
    const activeDomain = App.state.activeDomain || 'llm';
    // Count models per domain from _allModels (unfiltered)
    const domainCounts = {};
    for (const m of _allModels) {
      const d = m.domain || 'llm';
      domainCounts[d] = (domainCounts[d] || 0) + 1;
    }
    return `
      <div class="domain-tabs" style="display:flex;gap:var(--space-1);padding:var(--space-2) 0;border-bottom:1px solid var(--color-border);margin-bottom:var(--space-3)">
        ${domains.map(d => {
          const isActive = d.id === activeDomain;
          const count = domainCounts[d.id] || 0;
          const activeStyle = isActive
            ? `border-bottom:2px solid ${d.color};background:${d.color}11;font-weight:600`
            : 'border-bottom:2px solid transparent';
          return `<button class="domain-tab ${isActive ? 'active' : ''}" data-domain="${d.id}"
            style="display:flex;align-items:center;gap:6px;padding:var(--space-2) var(--space-3);
              background:transparent;border:none;border-radius:var(--radius) var(--radius) 0 0;
              cursor:pointer;font-size:13px;color:var(--color-text);${activeStyle}">
            <i data-lucide="${d.icon}" style="width:14px;height:14px"></i>
            ${d.shortLabel}
            <span style="font-size:11px;color:var(--color-text-3)">${count}</span>
          </button>`;
        }).join('')}
      </div>`;
  }

  function _render() {
    const container = document.getElementById('view-registry');
    const enriched = _enrichWithMCS();
    _filtered = _sortModels(_applyFilters(enriched));

    container.innerHTML = `
      ${_renderDomainTabs()}
      <div class="view-header">
        <div>
          <div class="view-title">Model Registry</div>
          <div class="view-subtitle">${_filtered.length} of ${_models.length} models</div>
        </div>
        <div style="display:flex;gap:var(--space-2)">
          <button class="btn-secondary" id="compare-export-btn"
            ${_compareSet.size < 2 || _compareSet.size > 5 ? 'disabled' : ''}
            title="Select 2\u20135 models to compare">
            <i data-lucide="git-compare" style="width:13px;height:13px;vertical-align:-2px"></i>
            <span class="btn-label">Compare${_compareSet.size >= 2 ? ` (${_compareSet.size})` : ''}</span>
          </button>
          <button class="btn-secondary" id="export-csv-btn">
            <i data-lucide="download" style="width:13px;height:13px;vertical-align:-2px"></i>
            <span class="btn-label">Export CSV</span>
          </button>
          <button class="btn-secondary" id="registry-sync-btn">
            <i data-lucide="refresh-cw" style="width:13px;height:13px;vertical-align:-2px"></i>
            <span class="btn-label">Sync All</span>
          </button>
        </div>
      </div>

      ${_renderBestForRow()}

      <button class="filter-fab" id="filter-fab-btn">
        <i data-lucide="filter"></i>
        <span>Filters</span>
      </button>

      <div id="registry-layout">
        ${_renderFilterPanel(_models)}
        <div id="registry-main">
          ${_filtered.length === 0
            ? `<div class="placeholder-view">
                <i data-lucide="search-x"></i>
                <p>No models match current filters</p>
              </div>`
            : _renderTable(_filtered) + _renderMobileCards(_filtered)}
        </div>
      </div>`;

    lucide.createIcons();
    _bindEvents();
  }

  // ── Event binding ────────────────────────────────────────────────────────────

  function _bindEvents() {
    // Sort headers
    document.querySelectorAll('.registry-table th[data-sort]').forEach(th => {
      th.addEventListener('click', () => {
        const col = th.dataset.sort;
        if (_sortCol === col) _sortDir = _sortDir === 'asc' ? 'desc' : 'asc';
        else { _sortCol = col; _sortDir = 'desc'; }
        _render();
      });
    });

    // Filter checkboxes
    document.querySelectorAll('[data-filter]').forEach(cb => {
      cb.addEventListener('change', () => {
        const set = cb.dataset.filter === 'provider' ? _filters.providers : _filters.licenses;
        cb.checked ? set.add(cb.value) : set.delete(cb.value);
        _render();
      });
    });

    // MCS threshold slider
    const slider = document.getElementById('mcs-threshold');
    if (slider) {
      slider.addEventListener('input', () => {
        _filters.mcsMin = parseInt(slider.value, 10);
        document.getElementById('mcs-threshold-val').textContent = _filters.mcsMin;
        _render();
      });
    }

    // Hardware toggle
    const hwToggle = document.getElementById('hw-toggle');
    if (hwToggle) {
      hwToggle.addEventListener('change', () => { _showHardware = hwToggle.checked; _render(); });
    }

    // Clear filters
    const clearBtn = document.getElementById('clear-filters-btn');
    if (clearBtn) {
      clearBtn.addEventListener('click', () => {
        _filters = { providers: new Set(), licenses: new Set(), tags: new Set(), mcsMin: 0 };
        _activePreset = null;
        _render();
      });
    }

    // Best For pills
    document.querySelectorAll('.pill[data-preset]').forEach(pill => {
      pill.addEventListener('click', () => {
        _activePreset = pill.dataset.preset || null;
        _sortCol = 'mcs'; _sortDir = 'desc';
        _render();
      });
    });

    // Score cell → provenance panel
    document.querySelectorAll('.score-cell[data-model]').forEach(cell => {
      cell.addEventListener('click', () => {
        _showProvenance(cell.dataset.model, cell.dataset.factor);
      });
    });

    // Cost cell → manual cost entry modal
    document.querySelectorAll('.cost-cell[data-model]').forEach(cell => {
      cell.addEventListener('click', () => _showCostModal(cell.dataset.model));
    });

    // License compat button
    const licBtn = document.getElementById('license-compat-btn');
    if (licBtn) licBtn.addEventListener('click', _showLicenseCompatModal);

    // Compare checkboxes
    document.querySelectorAll('.compare-cb').forEach(cb => {
      cb.addEventListener('change', () => {
        const id = cb.dataset.model;
        if (cb.checked) {
          if (_compareSet.size >= 5) { cb.checked = false; showToast('Max 5 models for comparison', 'warning'); return; }
          _compareSet.add(id);
        } else {
          _compareSet.delete(id);
        }
        // Update compare button without full re-render
        const btn = document.getElementById('compare-export-btn');
        if (btn) {
          btn.disabled = _compareSet.size < 2;
          btn.innerHTML = `<i data-lucide="git-compare" style="width:13px;height:13px;vertical-align:-2px"></i> <span class="btn-label">Compare${_compareSet.size >= 2 ? ` (${_compareSet.size})` : ''}</span>`;
          lucide.createIcons({ el: btn });
        }
      });
    });

    // Select all visible for compare
    document.getElementById('compare-select-all')?.addEventListener('change', (e) => {
      _compareSet.clear();
      if (e.target.checked) {
        _filtered.slice(0, 5).forEach(m => _compareSet.add(m.model_id));
      }
      _render();
    });

    // Compare → open side-by-side comparison modal
    const compareBtn = document.getElementById('compare-export-btn');
    if (compareBtn) compareBtn.addEventListener('click', async () => {
      if (_compareSet.size < 2) return;
      const selectedModels = _filtered.filter(m => _compareSet.has(m.model_id));
      const weights = _activePreset
        ? _buildFactorWeightsFromPreset(_activePreset)
        : _buildEqualWeights();
      const scoresForCompare = {};
      for (const m of selectedModels) {
        scoresForCompare[m.model_id] = Object.values(_scores[m.model_id] || {});
      }
      _showComparisonModal(selectedModels, weights, scoresForCompare);
    });

    // Export CSV
    const csvBtn = document.getElementById('export-csv-btn');
    if (csvBtn) csvBtn.addEventListener('click', _exportCSV);

    // Sync all
    const syncBtn = document.getElementById('registry-sync-btn');
    if (syncBtn) {
      syncBtn.addEventListener('click', async () => {
        syncBtn.disabled = true;
        try {
          const synced = await _syncFromStaticJSON();
          if (synced) showToast('Sync complete', 'success');
        } catch (e) {
          showToast('Sync failed: ' + e.message, 'error');
        } finally {
          syncBtn.disabled = false;
        }
      });
    }

    // Domain tabs
    document.querySelectorAll('.domain-tab').forEach(tab => {
      tab.addEventListener('click', () => switchDomain(tab.dataset.domain));
    });

    // Mobile card expand/collapse
    document.querySelectorAll('.mob-card').forEach(card => {
      card.addEventListener('click', (e) => {
        if (e.target.closest('a, button, input')) return;
        const wasExpanded = card.classList.contains('expanded');
        document.querySelectorAll('.mob-card.expanded').forEach(c => c.classList.remove('expanded'));
        if (!wasExpanded) card.classList.add('expanded');
      });
    });

    // Filter FAB + bottom sheet
    const filterFab = document.getElementById('filter-fab-btn');
    const filterSheet = document.getElementById('filter-sheet');
    const filterBackdrop = document.getElementById('filter-sheet-backdrop');
    const filterSheetContent = document.getElementById('filter-sheet-content');
    const filterSheetClose = document.getElementById('filter-sheet-close');

    function openFilterSheet() {
      const panel = document.getElementById('registry-filter-panel');
      if (panel && filterSheetContent) {
        filterSheetContent.innerHTML = panel.innerHTML;
        filterSheetContent.querySelectorAll('input[type="checkbox"]').forEach(cb => {
          cb.addEventListener('change', () => {
            const original = panel.querySelector(`input[data-filter="${cb.dataset.filter}"][value="${cb.value}"]`);
            if (original) { original.checked = cb.checked; original.dispatchEvent(new Event('change')); }
          });
        });
        const slider = filterSheetContent.querySelector('input[type="range"]');
        if (slider) {
          slider.addEventListener('input', (e) => {
            const orig = panel.querySelector('input[type="range"]');
            if (orig) { orig.value = e.target.value; orig.dispatchEvent(new Event('input')); }
          });
        }
      }
      filterSheet.classList.add('open');
      filterBackdrop.classList.add('open');
    }
    function closeFilterSheet() {
      filterSheet.classList.remove('open');
      filterBackdrop.classList.remove('open');
    }

    if (filterFab) filterFab.addEventListener('click', openFilterSheet);
    if (filterBackdrop) filterBackdrop.addEventListener('click', closeFilterSheet);
    if (filterSheetClose) filterSheetClose.addEventListener('click', closeFilterSheet);

    if (filterFab) {
      const activeCount = _getActiveFilterCount();
      const existing = filterFab.querySelector('.filter-badge');
      if (existing) existing.remove();
      if (activeCount > 0) {
        filterFab.insertAdjacentHTML('beforeend',

  // ── Comparison modal (side-by-side in-app) ──────────────────────────────────

  function _showComparisonModal(models, weights, allScores) {
    const baseline = App.state.baseline || {};
    const schema = App.state.factorSchema || [];

    // Compute MCS and per-factor scores for each model
    const ranked = models.map(m => {
      const scores = allScores[m.model_id] || [];
      const factorScores = {};
      for (const s of scores) {
        const b = baseline[s.sub_metric];
        if (!b) continue;
        let n = b.max === b.min ? 50 : ((s.raw_score - b.min) / (b.max - b.min)) * 100;
        n = Math.max(0, Math.min(100, n));
        if (b.invert) n = 100 - n;
        if (!factorScores[s.factor_group]) factorScores[s.factor_group] = [];
        factorScores[s.factor_group].push(n);
      }
      const mcs = _computeMCSInline(scores, weights);
      return { ...m, mcs, factorScores };
    }).sort((a, b) => b.mcs - a.mcs);

    const factorHeaders = schema
      .filter(f => (weights[f.factor_id] || 0) > 0)
      .sort((a, b) => (weights[b.factor_id]||0) - (weights[a.factor_id]||0));

              <th>MCS</th>
              ${factorHeaders.map(f => `<th title="${f.label} (w:${weights[f.factor_id]||0})">${f.label}</th>`).join('')}
            </tr>
          </thead>
          <tbody>
            ${ranked.map((m, i) => `
              <tr${i===0 ? ' style="font-weight:600"' : ''}>
                <td style="color:var(--color-text-3);font-family:var(--font-mono);position:sticky;left:0;background:var(--color-bg-1)">${i+1}</td>
                <td style="position:sticky;left:30px;background:var(--color-bg-1);white-space:nowrap">
                  ${m.name} <span style="color:var(--color-text-3);font-size:11px">${m.provider||''}</span>
                </td>
                <td>${scoreBar(m.mcs, i===0?'var(--color-success)':'var(--color-accent)')}</td>
                ${factorHeaders.map(f => {
                  const vals = m.factorScores[f.factor_id] || [];
                  const avg = vals.length ? vals.reduce((a,b)=>a+b,0)/vals.length : 0;
                  return `<td>${scoreBar(avg, 'var(--color-accent)')}</td>`;
                }).join('')}
              </tr>`).join('')}

    showModal(html, 800);

    document.getElementById('compare-modal-close').addEventListener('click', closeModal);
    document.getElementById('compare-download-md')?.addEventListener('click', () => {
      const md = ComparisonReport.generate(models, weights, allScores);
      _downloadFile(`comparison-${new Date().toISOString().slice(0,10)}.md`, md, 'text/markdown');
    });
  }

  // ── CSV export ───────────────────────────────────────────────────────────────

  async function _exportCSV() {
    const schema = App.state.factorSchema || [];
    const headers = ['model_id', 'name', 'provider', 'license', 'mcs',
      ...schema.map(f => f.factor_id)].join(',');

    const rows = _filtered.map(m => {
      const modelScores = Object.values(_scores[m.model_id] || {});
      const weights = _activePreset
        ? _buildFactorWeightsFromPreset(_activePreset)
        : _buildEqualWeights();

      // Reuse the inline MCS but also extract per-factor
      const baseline = App.state.baseline || {};
      const factorScores = {};
      for (const s of modelScores) {
        const b = baseline[s.sub_metric];
        if (!b) continue;
        let n = b.max === b.min ? 50 : ((s.raw_score - b.min) / (b.max - b.min)) * 100;
        n = Math.max(0, Math.min(100, n));
        if (b.invert) n = 100 - n;
        if (!factorScores[s.factor_group]) factorScores[s.factor_group] = [];
        factorScores[s.factor_group].push(n);
      }

      const factorCols = schema.map(f => {
        const vals = factorScores[f.factor_id] || [];
        return vals.length ? (vals.reduce((a,b)=>a+b,0)/vals.length).toFixed(1) : '';
      });

      return [m.model_id, `"${m.name}"`, m.provider || '', m.license || '', (m.mcs||0).toFixed(1), ...factorCols].join(',');
    });

    const csv = [headers, ...rows].join('\n');
    _downloadFile(
      `modelindex-registry-${new Date().toISOString().slice(0,10)}.csv`,
      csv,
      'text/csv'
    );
  }

  // ── Public API ───────────────────────────────────────────────────────────────

  App.views.registry = {
    async mount() {
      await this.refresh();
    },

    onEnter() {
      // Re-render with current state (no fetch needed unless stale)
      if (_models.length > 0) _render();
      else this.refresh();
    },

    async refresh() {
      showLoading('view-registry');
      try {
        const [models, allPricing] = await Promise.all([
          DB.getModels(),
          DB.getAllUserPricing(),
        ]);
        _allModels = models;
        _models = models.filter(m => (m.domain || 'llm') === App.state.activeDomain);

        // Load scores for all models in parallel (batched)
        const scoreResults = await Promise.all(
          _models.map(m => DB.getScores(m.model_id))
        );
        _scores = {};
        _models.forEach((m, i) => {
          _scores[m.model_id] = {};
          for (const s of (scoreResults[i] || [])) {
            _scores[m.model_id][s.sub_metric] = s;
          }
        });

        _pricing = {};
        for (const p of (allPricing || [])) {
          _pricing[p.model_id] = p;
        }

        _render();
      } catch (err) {
        console.error('Registry refresh error:', err);
        showToast('Failed to load registry', 'error');
      }
    },
  };
})();

  // ── Wizard controller ────────────────────────────────────────────────────────

  const WizardController = {
    currentStep: 1,
    maxReached: 1,
    indexConfig: {},   // accumulates across steps

    next() {
      if (!this.validate()) return false;
      if (this.currentStep < 6) {
        this.currentStep++;
        this.maxReached = Math.max(this.maxReached, this.currentStep);
        _renderStep();
      }
      return true;
    },

    back() {
      if (this.currentStep > 1) {
        this.currentStep--;
        // Invalidate downstream sensitivity results when going back
        if (this.currentStep <= 3) delete this.indexConfig.sensitivityResult;
        _renderStep();
      }
    },

    goTo(n) {
      if (n <= this.maxReached) {
        this.currentStep = n;
        _renderStep();
      }
    },

    validate() {
      const step = this.currentStep;
      if (step === 2 && !this.indexConfig.name) {
        showToast('Enter a name for this index', 'warning'); return false;
      }
      if (step === 3) {
        const total = _getWeightTotal();
        if (Math.abs(total - 100) > 0.5) {
          showToast(`Factor weights must sum to 100 (currently ${total.toFixed(0)})`, 'warning');
          return false;
        }
      }
      if (step === 4 && (!this.indexConfig.selected_models || this.indexConfig.selected_models.length === 0)) {
        showToast('Select at least one model', 'warning'); return false;
      }
      return true;
    },

    reset() {
      this.currentStep = 1;
      this.maxReached  = 1;
      this.indexConfig = {};
      _renderStep();
    },
  };

  // ── State ────────────────────────────────────────────────────────────────────
  let _allModels   = [];   // all models from registry
  let _allScores   = {};   // { modelId: [scoreRows] }
  let _mcsDebounce = null;
  let _sensitivityChart = null;

  // ── Helpers ──────────────────────────────────────────────────────────────────

  function _getWeightTotal() {
    const cfg = WizardController.indexConfig;
    const weights = cfg.factor_weights || {};
    const schema = App.state.factorSchema || [];
    const validIds = new Set(schema.map(f => f.factor_id));
    return Object.entries(weights)
      .filter(([k]) => validIds.has(k))
      .reduce((a, [, v]) => a + (Number(v) || 0), 0);
  }

  function _equalizeWeights() {
    const schema = App.state.factorSchema || [];
    const each = Math.floor(100 / schema.length);
    const rem  = 100 - each * schema.length;
    const w = {};
    schema.forEach((f, i) => { w[f.factor_id] = each + (i === 0 ? rem : 0); });
    WizardController.indexConfig.factor_weights = w;
  }

  function _computeMCSInline(modelScores, factorWeights) {
    const baseline = App.state.baseline;
    if (!baseline || !modelScores || modelScores.length === 0) return 0;

    const subScores = {};
    for (const s of modelScores) {
      const b = baseline[s.sub_metric];
      if (!b) continue;
      let n = b.max === b.min ? 50 : ((s.raw_score - b.min) / (b.max - b.min)) * 100;
      n = Math.max(0, Math.min(100, n));
      if (b.invert) n = 100 - n;
      subScores[s.sub_metric] = n;
    }

    let mcs = 0, totalW = 0;
    for (const factor of (App.state.factorSchema || [])) {
      const w = (factorWeights || {})[factor.factor_id] || 0;
      if (w === 0) continue;
      const vals = factor.sub_metrics.map(sm => subScores[sm.sub_metric_id]).filter(v => v != null);
      if (!vals.length) continue;
      mcs += (vals.reduce((a, b) => a + b, 0) / vals.length) * w;
      totalW += w;
    }
    return totalW > 0 ? mcs / totalW : 0;
  }

  function _modelsPassingConstraints() {
    const c = WizardController.indexConfig.hard_constraints || {};
    return _allModels.filter(m => {
      if (c.licenses?.length && !c.licenses.includes(m.license)) return false;
      if (c.self_hostable && !m.tags?.includes('open-weight')) return false;
      return true;
    });
  }

  function _renderSensitivityResults(result) {
    const stabilityColor = result.rankStabilityLabel === 'Robust' ? 'badge-green'
      : result.rankStabilityLabel === 'Moderate' ? 'badge-yellow' : 'badge-red';

    // Build factor impact ranking
    const schema = App.state.factorSchema || [];
    const impacts = [];
    for (const factor of schema) {
      const pf = result.perFactor?.[factor.factor_id];
      if (!pf) continue;
      const vals = pf.modelDeltas ? Object.values(pf.modelDeltas) : Object.values(pf);
      const avg = vals.reduce((s, v) => s + Math.abs(v.rankDelta || v.maxAbsDelta || 0), 0) / Math.max(vals.length, 1);
      impacts.push({ label: factor.label, id: factor.factor_id, avg });
    }
    impacts.sort((a, b) => b.avg - a.avg);
    const maxImpact = impacts[0]?.avg || 1;

    // Plain-English interpretation
    const stabilityDesc = result.rankStabilityLabel === 'Robust'
      ? 'Your ranking is stable \u2014 small weight changes won\u2019t significantly reshuffle model positions.'
      : result.rankStabilityLabel === 'Moderate'
      ? 'Your ranking is moderately sensitive \u2014 some weight tweaks could shift a few models by 1\u20132 positions.'
      : 'Your ranking is fragile \u2014 small weight changes can cause large rank swings. Consider adjusting weights.';

    const topFactor = impacts[0];
    const topFactorNote = topFactor
      ? `<strong>${topFactor.label}</strong> has the most influence \u2014 changing its weight by 10 points shifts models by ${topFactor.avg.toFixed(1)} positions on average.`
      : '';

    const bottomFactor = impacts[impacts.length - 1];
    const bottomNote = bottomFactor && impacts.length > 2
      ? ` <strong>${bottomFactor.label}</strong> has the least impact (${bottomFactor.avg.toFixed(1)} positions).`
      : '';

    const impactBars = impacts.map(imp => {
      const pct = Math.min((imp.avg / maxImpact) * 100, 100);
      const level = pct > 66 ? 'High' : pct > 33 ? 'Medium' : 'Low';
      const color = pct > 66 ? 'var(--color-danger, #c92a2a)' : pct > 33 ? 'var(--color-warning, #e67700)' : 'var(--color-success, #2b8a3e)';
      return `
        <div style="display:flex;align-items:center;gap:var(--space-2);padding:6px 0;
          border-bottom:1px solid var(--color-border)">
          <div style="width:160px;font-size:13px;color:var(--color-text-1);flex-shrink:0">${imp.label}</div>
          <div style="flex:1;height:10px;background:var(--color-surface-2, #f0f0f0);border-radius:5px;overflow:hidden">
            <div style="width:${pct}%;height:100%;background:${color};border-radius:5px;transition:width .3s"></div>
          </div>
          <div style="width:40px;text-align:right;font-size:11px;color:var(--color-text-3);font-family:var(--font-mono)">${imp.avg.toFixed(1)}</div>
          <span class="badge" style="font-size:10px;padding:1px 6px;background:${color};color:#fff;min-width:48px;text-align:center">${level}</span>
        </div>`;
    }).join('');

    return `
      <div style="display:flex;align-items:center;gap:var(--space-3);margin-bottom:var(--space-4)">
        <div style="font-size:28px;font-weight:700;font-family:var(--font-mono)">
          ${result.rankStability.toFixed(0)}
        </div>
        <div>
          <span class="badge ${stabilityColor}" style="font-size:13px;padding:3px 10px">
            ${result.rankStabilityLabel}
          </span>
          <div style="font-size:12px;color:var(--color-text-3);margin-top:2px">Rank Stability Score (0\u2013100)</div>
        </div>
        <button class="btn-secondary" id="rerun-sensitivity-btn" style="margin-left:auto;font-size:12px">
          Re-run
        </button>
      </div>

      <div style="background:var(--color-surface-2, #f8f9fa);border-radius:8px;padding:var(--space-4);margin-bottom:var(--space-5);
        border-left:3px solid ${stabilityColor === 'badge-green' ? 'var(--color-success, #2b8a3e)' : stabilityColor === 'badge-yellow' ? 'var(--color-warning, #e67700)' : 'var(--color-danger, #c92a2a)'}">
        <div style="font-size:13px;color:var(--color-text-1);line-height:1.5">
          ${stabilityDesc} ${topFactorNote}${bottomNote}
        </div>
      </div>

      <div style="font-size:12px;font-weight:600;text-transform:uppercase;
        letter-spacing:.5px;color:var(--color-text-3);margin-bottom:var(--space-2)">
        Factor Impact Ranking
      </div>
      <div style="font-size:11px;color:var(--color-text-3);margin-bottom:var(--space-3)">
        Average positions shifted when a factor\u2019s weight changes by \u00B110 points. Higher = more influence on your ranking.
      </div>
      <div style="margin-bottom:var(--space-5)">
        ${impactBars}
      </div>

      <div id="sensitivity-chart-wrap" style="margin-bottom:var(--space-5)">
        <div style="font-size:12px;font-weight:600;text-transform:uppercase;
          letter-spacing:.5px;color:var(--color-text-3);margin-bottom:var(--space-3)">
          Detailed Chart
        </div>
        <canvas id="sensitivity-chart" height="220"></canvas>
      </div>

      ${result.crossoverPoints && result.crossoverPoints.length > 0 ? `
        <div>
          <div style="font-size:12px;font-weight:600;text-transform:uppercase;
            letter-spacing:.5px;color:var(--color-text-3);margin-bottom:var(--space-2)">
            Crossover Points
          </div>
          <div style="font-size:11px;color:var(--color-text-3);margin-bottom:var(--space-3)">
            Model pairs that would swap ranking positions if you adjust the given factor\u2019s weight.
          </div>
          ${result.crossoverPoints.slice(0, 8).map(cp => `
            <div style="font-size:13px;color:var(--color-text-2);padding:var(--space-2) 0;
              border-bottom:1px solid var(--color-border)">
              ${cp.modelA} \u2194 ${cp.modelB} \u2014 swap at \u00B1${cp.delta ? cp.delta.toFixed(0) : '?'} on <strong>${cp.factorId}</strong>
            </div>`).join('')}
        </div>` : ''}

      <p style="font-size:12px;color:var(--color-text-3);margin-top:var(--space-4)">
        To adjust weights, go back to Step 3.
      </p>`;
  }
